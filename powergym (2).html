<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerGym — Sistema de Gestión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --black2: #111111;
  --black3: #1a1a1a;
  --black4: #222222;
  --black5: #2d2d2d;
  --red: #e31e24;
  --red2: #ff2d35;
  --red3: #c41920;
  --red-glow: rgba(227,30,36,0.18);
  --red-dim: rgba(227,30,36,0.08);
  --white: #f5f5f5;
  --white2: #cccccc;
  --white3: #888888;
  --white4: #555555;
  --green: #22c55e;
  --yellow: #f59e0b;
  --blue: #3b82f6;
  --sidebar-w: 250px;
  --header-h: 62px;
  --radius: 8px;
  --radius2: 14px;
  --transition: 0.2s cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; overflow: hidden; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--black2); }
::-webkit-scrollbar-thumb { background: var(--black5); border-radius: 4px; }

/* ===========================
   AUTH SCREENS
=========================== */
#auth-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--black);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn .4s ease;
}
#auth-overlay.hidden { display: none; }
.auth-box {
  width: 420px; max-width: 95vw;
  background: var(--black2);
  border: 1px solid var(--black5);
  border-radius: var(--radius2);
  padding: 44px 40px 40px;
  position: relative;
  box-shadow: 0 30px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04);
}
.auth-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--red), transparent);
  border-radius: var(--radius2) var(--radius2) 0 0;
}
.auth-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px; letter-spacing: 2px;
  color: var(--white); margin-bottom: 4px;
  line-height: 1;
}
.auth-logo span { color: var(--red); }
.auth-subtitle { color: var(--white3); font-size: 13px; margin-bottom: 32px; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1px solid var(--black5); }
.auth-tab {
  flex: 1; padding: 10px 0; text-align: center; font-size: 13px; font-weight: 500;
  color: var(--white3); cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: var(--transition);
}
.auth-tab.active { color: var(--white); border-color: var(--red); }
.auth-form { display: none; }
.auth-form.active { display: flex; flex-direction: column; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--white3); letter-spacing: .5px; text-transform: uppercase; }
.form-input {
  background: var(--black3); border: 1px solid var(--black5);
  border-radius: var(--radius); color: var(--white);
  padding: 11px 14px; font-size: 14px; font-family: inherit;
  transition: var(--transition); outline: none;
}
.form-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-dim); }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 11px 20px; border-radius: var(--radius);
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; border: none; transition: var(--transition); outline: none;
}
.btn-primary {
  background: var(--red); color: white;
}
.btn-primary:hover { background: var(--red2); transform: translateY(-1px); box-shadow: 0 8px 24px var(--red-glow); }
.btn-secondary { background: var(--black4); color: var(--white2); border: 1px solid var(--black5); }
.btn-secondary:hover { background: var(--black5); }
.btn-ghost { background: transparent; color: var(--white3); }
.btn-ghost:hover { color: var(--white); background: var(--black3); }
.btn-danger { background: var(--red-dim); color: var(--red2); border: 1px solid var(--red-glow); }
.btn-danger:hover { background: var(--red); color: white; }
.btn-success { background: rgba(34,197,94,.1); color: var(--green); border: 1px solid rgba(34,197,94,.2); }
.btn-success:hover { background: var(--green); color: white; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-icon { width: 34px; height: 34px; padding: 0; border-radius: var(--radius); }
.auth-demo { margin-top: 18px; padding: 14px; background: var(--black3); border-radius: var(--radius); border: 1px solid var(--black5); }
.auth-demo-title { font-size: 11px; color: var(--white3); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; }
.auth-demo-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.auth-demo-row:last-child { margin-bottom: 0; }
.auth-demo-label { font-size: 12px; color: var(--white2); }
.auth-demo-value { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--red); background: var(--red-dim); padding: 2px 8px; border-radius: 4px; }

/* ===========================
   LAYOUT
=========================== */
#app { display: flex; height: 100vh; overflow: hidden; }
#app.hidden { display: none; }

/* SIDEBAR */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--black2);
  border-right: 1px solid var(--black4);
  display: flex; flex-direction: column;
  transition: transform var(--transition);
  z-index: 100; position: relative;
}
#sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); position: absolute; height: 100%; }
.sidebar-logo {
  padding: 20px 20px 18px;
  border-bottom: 1px solid var(--black4);
  display: flex; align-items: center; gap: 12px;
}
.sidebar-logo-mark {
  width: 36px; height: 36px; background: var(--red);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: white; letter-spacing: 0;
  box-shadow: 0 4px 14px var(--red-glow);
}
.sidebar-logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1.5px; color: var(--white); }
.sidebar-logo-text span { color: var(--red); }
.sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
.nav-section-label { font-size: 10px; color: var(--white4); text-transform: uppercase; letter-spacing: 1px; padding: 6px 10px 4px; margin-top: 8px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: var(--radius);
  color: var(--white3); cursor: pointer; font-size: 13px; font-weight: 500;
  transition: var(--transition); margin-bottom: 2px; position: relative;
}
.nav-item:hover { color: var(--white); background: var(--black3); }
.nav-item.active { color: var(--white); background: var(--red-dim); }
.nav-item.active::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px; background: var(--red); border-radius: 0 2px 2px 0; }
.nav-item .nav-icon { width: 18px; text-align: center; font-size: 16px; flex-shrink: 0; }
.sidebar-user {
  padding: 16px; border-top: 1px solid var(--black4);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--red); color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; flex-shrink: 0;
  box-shadow: 0 0 0 2px var(--black3), 0 0 0 4px var(--red-glow);
}
.sidebar-user-info { flex: 1; min-width: 0; }
.sidebar-user-name { font-size: 13px; font-weight: 600; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-user-role { font-size: 11px; color: var(--white3); }
.badge-role { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
.badge-role.admin { background: var(--red-dim); color: var(--red2); border: 1px solid var(--red-glow); }
.badge-role.user { background: rgba(59,130,246,.1); color: var(--blue); border: 1px solid rgba(59,130,246,.2); }

/* MAIN */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

/* HEADER */
#header {
  height: var(--header-h); background: var(--black2);
  border-bottom: 1px solid var(--black4);
  display: flex; align-items: center; padding: 0 24px;
  gap: 16px; flex-shrink: 0;
}
#menu-toggle {
  width: 36px; height: 36px; border-radius: var(--radius);
  background: var(--black3); border: 1px solid var(--black5);
  color: var(--white2); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: var(--transition);
}
#menu-toggle:hover { background: var(--black5); color: var(--white); }
#header-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; flex: 1; }
.header-actions { display: flex; align-items: center; gap: 10px; }
.header-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: var(--red);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: white; cursor: pointer;
  box-shadow: 0 0 0 2px var(--black2), 0 0 0 4px var(--red-glow);
}

/* CONTENT */
#content { flex: 1; overflow-y: auto; padding: 28px 28px; }

/* ===========================
   COMPONENTS
=========================== */
.page { display: none; animation: fadeInUp .3s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.page-header { margin-bottom: 24px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.page-title { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 1px; }
.page-subtitle { color: var(--white3); font-size: 13px; margin-top: 2px; }

/* STAT CARDS */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card {
  background: var(--black2); border: 1px solid var(--black4);
  border-radius: var(--radius2); padding: 20px;
  position: relative; overflow: hidden; transition: var(--transition);
}
.stat-card:hover { border-color: var(--black5); transform: translateY(-2px); }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.stat-card.red::before { background: var(--red); }
.stat-card.green::before { background: var(--green); }
.stat-card.yellow::before { background: var(--yellow); }
.stat-card.blue::before { background: var(--blue); }
.stat-icon { font-size: 24px; margin-bottom: 12px; }
.stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 38px; line-height: 1; margin-bottom: 4px; }
.stat-card.red .stat-value { color: var(--red2); }
.stat-card.green .stat-value { color: var(--green); }
.stat-card.yellow .stat-value { color: var(--yellow); }
.stat-card.blue .stat-value { color: var(--blue); }
.stat-label { font-size: 12px; color: var(--white3); text-transform: uppercase; letter-spacing: .5px; }
.stat-change { font-size: 11px; color: var(--green); margin-top: 6px; }

/* CARDS */
.card {
  background: var(--black2); border: 1px solid var(--black4);
  border-radius: var(--radius2); padding: 20px; margin-bottom: 20px;
}
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; gap: 12px; flex-wrap: wrap; }
.card-title { font-size: 15px; font-weight: 600; color: var(--white); }

/* BADGES */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; letter-spacing: .3px;
}
.badge.active { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
.badge.expired { background: rgba(227,30,36,.12); color: var(--red2); border: 1px solid var(--red-glow); }
.badge.pending { background: rgba(245,158,11,.12); color: var(--yellow); border: 1px solid rgba(245,158,11,.25); }
.badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* TABLES */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { font-size: 11px; color: var(--white3); text-transform: uppercase; letter-spacing: .6px; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--black4); white-space: nowrap; }
td { padding: 13px 14px; border-bottom: 1px solid var(--black4); font-size: 13px; color: var(--white2); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--black3); }
.td-name { font-weight: 600; color: var(--white); display: flex; align-items: center; gap: 10px; }
.td-avatar {
  width: 30px; height: 30px; border-radius: 50%; background: var(--black5);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 12px; color: var(--white); flex-shrink: 0;
}
.td-avatar.red { background: var(--red); }
.td-avatar.blue { background: var(--blue); }
.td-avatar.green { background: rgba(34,197,94,.3); }

/* SEARCH + FILTERS */
.search-bar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px;
}
.search-input-wrap { position: relative; flex: 1; min-width: 180px; }
.search-input-wrap .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--white3); }
.search-input {
  width: 100%; background: var(--black3); border: 1px solid var(--black5);
  border-radius: var(--radius); color: var(--white); padding: 9px 14px 9px 38px;
  font-size: 13px; font-family: inherit; outline: none; transition: var(--transition);
}
.search-input:focus { border-color: var(--red); box-shadow: 0 0 0 2px var(--red-dim); }
.filter-select {
  background: var(--black3); border: 1px solid var(--black5);
  border-radius: var(--radius); color: var(--white2); padding: 9px 14px;
  font-size: 13px; font-family: inherit; outline: none; cursor: pointer;
  transition: var(--transition);
}
.filter-select:focus { border-color: var(--red); }

/* FORM ELEMENTS */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
.form-section-title { font-size: 13px; font-weight: 600; color: var(--white3); text-transform: uppercase; letter-spacing: .5px; margin: 20px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--black4); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  animation: fadeIn .2s ease; backdrop-filter: blur(4px);
}
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--black2); border: 1px solid var(--black4);
  border-radius: var(--radius2); padding: 28px;
  width: 520px; max-width: 95vw; max-height: 90vh;
  overflow-y: auto; box-shadow: 0 40px 100px rgba(0,0,0,.6);
  animation: fadeInUp .25s ease;
}
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: .5px; }
.modal-close { width: 30px; height: 30px; border-radius: var(--radius); background: var(--black4); border: none; color: var(--white3); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
.modal-close:hover { background: var(--red); color: white; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

/* CALENDAR */
.calendar { width: 100%; }
.calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--black4); border-radius: var(--radius); overflow: hidden; }
.cal-day-label { background: var(--black3); padding: 8px; text-align: center; font-size: 11px; color: var(--white3); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
.cal-day { background: var(--black2); min-height: 90px; padding: 8px; position: relative; transition: var(--transition); }
.cal-day:hover { background: var(--black3); }
.cal-day.today { background: var(--red-dim); }
.cal-day-num { font-size: 12px; color: var(--white3); font-weight: 500; margin-bottom: 4px; }
.cal-day.today .cal-day-num { color: var(--red2); font-weight: 700; }
.cal-event {
  font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
  transition: var(--transition);
}
.cal-event.yoga { background: rgba(59,130,246,.2); color: #93c5fd; border-left: 2px solid var(--blue); }
.cal-event.crossfit { background: var(--red-dim); color: #fca5a5; border-left: 2px solid var(--red); }
.cal-event.spinning { background: rgba(34,197,94,.15); color: #86efac; border-left: 2px solid var(--green); }
.cal-event.pilates { background: rgba(245,158,11,.15); color: #fcd34d; border-left: 2px solid var(--yellow); }
.cal-event:hover { opacity: .8; transform: scale(1.02); }

/* PROGRESS */
.progress-bar { height: 6px; background: var(--black4); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: var(--red); transition: width .5s ease; }
.progress-fill.green { background: var(--green); }
.progress-fill.yellow { background: var(--yellow); }

/* ATTENDANCE */
.attendance-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(36px, 1fr)); gap: 5px; margin: 10px 0; }
.att-dot { width: 36px; height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--white2); background: var(--black3); transition: var(--transition); cursor: default; position: relative; }
.att-dot.present { background: rgba(34,197,94,.18); color: var(--green); }
.att-dot.absent { background: var(--black3); color: var(--white4); }
.att-dot.future { background: var(--black4); color: var(--white4); opacity: .5; }
.att-dot:hover::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: var(--black5); color: var(--white); font-size: 10px; padding: 3px 7px; border-radius: 4px; white-space: nowrap; z-index: 10; }

/* PLAN CARDS */
.plans-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.plan-card {
  background: var(--black3); border: 1px solid var(--black4);
  border-radius: var(--radius2); padding: 22px; position: relative; overflow: hidden;
  transition: var(--transition);
}
.plan-card:hover { border-color: var(--red); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,.4); }
.plan-card.featured { border-color: var(--red); }
.plan-card.featured::after { content: 'POPULAR'; position: absolute; top: 12px; right: -20px; background: var(--red); color: white; font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 3px 28px; transform: rotate(35deg); transform-origin: center; }
.plan-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; margin-bottom: 4px; }
.plan-price { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--red2); line-height: 1; margin-bottom: 2px; }
.plan-period { font-size: 12px; color: var(--white3); margin-bottom: 16px; }
.plan-features { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
.plan-features li { font-size: 12px; color: var(--white2); display: flex; align-items: center; gap: 7px; }
.plan-features li::before { content: '✓'; color: var(--green); font-weight: 700; flex-shrink: 0; }

/* USER PROFILE */
.profile-header-card {
  background: var(--black2); border: 1px solid var(--black4);
  border-radius: var(--radius2); padding: 28px;
  display: flex; align-items: center; gap: 24px; margin-bottom: 20px;
}
.profile-avatar-lg {
  width: 80px; height: 80px; border-radius: 50%; background: var(--red);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: white;
  box-shadow: 0 0 0 3px var(--black2), 0 0 0 6px var(--red-glow);
  flex-shrink: 0; cursor: pointer; position: relative; overflow: hidden;
}
.profile-avatar-lg input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.profile-avatar-edit { position: absolute; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: var(--transition); font-size: 18px; }
.profile-avatar-lg:hover .profile-avatar-edit { opacity: 1; }

/* TAGS */
.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { background: var(--black4); color: var(--white2); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }

/* NOTIFICATION */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  background: var(--black2); border: 1px solid var(--black4);
  border-radius: var(--radius); padding: 14px 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  display: flex; align-items: center; gap: 12px;
  max-width: 340px; animation: slideInRight .3s ease;
  font-size: 13px;
}
.toast.hidden { display: none; }
.toast.success { border-color: rgba(34,197,94,.3); }
.toast.error { border-color: var(--red-glow); }
@keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

/* RESPONSIVE */
@media (max-width: 768px) {
  :root { --sidebar-w: 260px; }
  #sidebar { position: absolute; height: 100%; box-shadow: 4px 0 30px rgba(0,0,0,.5); }
  #sidebar:not(.collapsed) { transform: translateX(0); }
  #sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); }
  #content { padding: 16px; }
  .form-row, .form-row.triple { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .page-header { flex-direction: column; align-items: flex-start; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr; }
  .calendar-grid { display: none; }
}

/* EMPTY STATE */
.empty-state { text-align: center; padding: 60px 20px; color: var(--white3); }
.empty-state-icon { font-size: 48px; margin-bottom: 14px; opacity: .5; }
.empty-state-title { font-size: 16px; font-weight: 600; color: var(--white2); margin-bottom: 6px; }

/* TABS */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--black4); margin-bottom: 20px; }
.tab-btn { padding: 10px 18px; color: var(--white3); font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: var(--transition); }
.tab-btn.active { color: var(--white); border-color: var(--red); }
.tab-btn:hover:not(.active) { color: var(--white2); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* QUICK ACTIONS */
.quick-actions { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
.quick-action {
  background: var(--black2); border: 1px solid var(--black4);
  border-radius: var(--radius2); padding: 18px 14px; text-align: center;
  cursor: pointer; transition: var(--transition);
}
.quick-action:hover { border-color: var(--red); background: var(--red-dim); }
.quick-action-icon { font-size: 24px; margin-bottom: 8px; }
.quick-action-label { font-size: 12px; font-weight: 500; color: var(--white2); }
</style>

// ============================================================

// ============================================================
const USERS = [

];

const ATTENDANCE = {};
(function generateAttendance(){
  const today = new Date();
  USERS.filter(u=>u.role==='user').forEach(u=>{
    ATTENDANCE[u.id] = [];
    for(let i=30;i>=0;i--){
      const d = new Date(today);
      d.setDate(d.getDate()-i);
      if(d<=today && Math.random()>0.35 && d.getDay()!==0){
        ATTENDANCE[u.id].push(d.toISOString().split('T')[0]);
      }
    }
  });
})();

const USER_CLASSES = { 2:[1,3,5], 3:[1,4], 4:[], 5:[1,6], 6:[2,7] };

let currentUser = null;
let currentPage = null;
let nextId = 7;

// ============================================================
// AUTH
// ============================================================
function switchAuthTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active', (tab==='login'?0:1)===i));
  document.getElementById('form-login').classList.toggle('active', tab==='login');
  document.getElementById('form-register').classList.toggle('active', tab==='register');
}

function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const user = USERS.find(u=>u.email===email && u.pass===pass);
  if(!user){ showToast('Credenciales incorrectas', 'error'); return; }
  loginAs(user);
}

function doRegister(){
  const name = document.getElementById('reg-name').value.trim();
  const lastname = document.getElementById('reg-lastname').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const pass = document.getElementById('reg-pass').value;
  if(!name||!email||!pass){ showToast('Completa todos los campos', 'error'); return; }
  if(USERS.find(u=>u.email===email)){ showToast('Ese correo ya está registrado', 'error'); return; }
  const newUser = { id:nextId++, name, lastname, email, pass, role:'user', phone, goal:'', status:'active', plan:'Mensual', planExpiry:'2026-04-22', joined:new Date().toISOString().split('T')[0], avatar:null };
  USERS.push(newUser);
  ATTENDANCE[newUser.id] = [];
  USER_CLASSES[newUser.id] = [];
  loginAs(newUser);
  showToast('¡Cuenta creada exitosamente!', 'success');
}

function loginAs(user){
  currentUser = user;
  document.getElementById('auth-overlay').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  initApp();
}

function doLogout(){
  currentUser = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('auth-overlay').classList.remove('hidden');
  document.getElementById('login-email').value='admin@powergym.mx';
  document.getElementById('login-pass').value='admin123';
}

// ============================================================
// APP INIT
// ============================================================
function initApp(){
  buildSidebar();
  updateHeaderAvatar();
  const defaultPage = currentUser.role==='admin' ? 'dashboard' : 'mi-panel';
  navigateTo(defaultPage);
}

function buildSidebar(){
  const nav = document.getElementById('sidebar-nav');
  const isAdmin = currentUser.role==='admin';
  const initials = (currentUser.name[0]+(currentUser.lastname||'')[0]||'').toUpperCase();
  document.getElementById('sidebar-avatar-initials').textContent = initials;
  document.getElementById('sidebar-user-name').textContent = currentUser.name+' '+(currentUser.lastname||'');
  document.getElementById('sidebar-user-role-badge').innerHTML = `<span class="badge-role ${currentUser.role}">${isAdmin?'Administrador':'Miembro'}</span>`;

  const adminLinks = [
    { icon:'📊', label:'Dashboard', page:'dashboard' },
    { icon:'👥', label:'Miembros', page:'miembros' },
    { icon:'🏋️', label:'Clases', page:'clases' },
    { icon:'📋', label:'Asistencia', page:'asistencia' },
    { icon:'💳', label:'Planes', page:'planes' },
    { icon:'👤', label:'Mi Perfil', page:'perfil' },
  ];
  const userLinks = [
    { icon:'🏠', label:'Mi Panel', page:'mi-panel' },
    { icon:'🏋️', label:'Clases', page:'clases' },
    { icon:'📅', label:'Mi Asistencia', page:'mi-asistencia' },
    { icon:'👤', label:'Mi Perfil', page:'perfil' },
  ];
  const links = isAdmin ? adminLinks : userLinks;
  nav.innerHTML = `<div class="nav-section-label">${isAdmin?'Administración':'Mi Cuenta'}</div>` +
    links.map(l=>`<div class="nav-item" id="nav-${l.page}" onclick="navigateTo('${l.page}')"><span class="nav-icon">${l.icon}</span><span>${l.label}</span></div>`).join('');
}

function updateHeaderAvatar(){
  const initials = (currentUser.name[0]+(currentUser.lastname||'')[0]||'').toUpperCase();
  document.getElementById('header-avatar').textContent = initials;
}

function navigateTo(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el = document.getElementById('page-'+page);
  if(el) el.classList.add('active');
  const nav = document.getElementById('nav-'+page);
  if(nav) nav.classList.add('active');
  currentPage = page;
  document.getElementById('header-title').textContent = getPageTitle(page);
  renderPage(page);
}

function getPageTitle(p){
  const titles = { dashboard:'Dashboard', miembros:'Gestión de Miembros', clases:'Clases & Horarios', asistencia:'Control de Asistencia', planes:'Planes de Membresía', 'mi-panel':'Mi Panel', 'mi-asistencia':'Mi Asistencia', perfil:'Mi Perfil' };
  return titles[p]||p;
}

function renderPage(page){
  const el = document.getElementById('page-'+page);
  if(!el) return;
  const fn = { dashboard:renderDashboard, miembros:renderMiembros, clases:renderClases, asistencia:renderAsistencia, planes:renderPlanes, 'mi-panel':renderMiPanel, 'mi-asistencia':renderMiAsistencia, perfil:renderPerfil }[page];
  if(fn) fn(el);
}

// ============================================================
// DASHBOARD (Admin)
// ============================================================

    <div class="quick-action" onclick="navigateTo('miembros')"><div class="quick-action-icon">👤</div><div class="quick-action-label">Nuevo Miembro</div></div>
    <div class="quick-action" onclick="openNuevaClase()"><div class="quick-action-icon">➕</div><div class="quick-action-label">Nueva Clase</div></div>
    <div class="quick-action" onclick="navigateTo('asistencia')"><div class="quick-action-icon">📋</div><div class="quick-action-label">Asistencia</div></div>
    <div class="quick-action" onclick="navigateTo('planes')"><div class="quick-action-icon">💳</div><div class="quick-action-label">Ver Planes</div></div>
  </div>

    <div class="card">
      <div class="card-header"><span class="card-title">👥 Miembros Recientes</span></div>
      <table><thead><tr><th>Miembro</th><th>Plan</th><th>Estado</th></tr></thead><tbody>
      ${USERS.filter(u=>u.role==='user').slice(0,5).map(u=>`
        <tr><td><div class="td-name"><div class="td-avatar red">${u.name[0]}</div>${u.name} ${u.lastname||''}</div></td>

      </tbody></table>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">🏋️ Clases de Hoy</span></div>
      ${CLASSES.filter((_,i)=>i<4).map(c=>`

      </div>`).join('')}

    <div class="card-header"><span class="card-title">📊 Ocupación por Clase</span></div>
    ${CLASSES.map(c=>{const pct=Math.round(c.enrolled/c.capacity*100);return`
    <div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:13px;">${c.name}</span><span style="font-size:12px;color:var(--white3);">${c.enrolled}/${c.capacity} (${pct}%)</span></div>
      <div class="progress-bar"><div class="progress-fill ${pct>90?'':'pct>70?yellow:green'}" style="width:${pct}%;background:${pct>90?'var(--red)':pct>70?'var(--yellow)':'var(--green)'}"></div></div>

let memberSearch='', memberFilter='all';
function renderMiembros(el){
  const members = USERS.filter(u=>u.role==='user');

    const matchSearch = !q || (u.name+' '+(u.lastname||'')+u.email).toLowerCase().includes(q);
    const matchFilter = memberFilter==='all'||u.status===memberFilter;
    return matchSearch&&matchFilter;

  el.innerHTML = `
  <div class="page-header">
    <div><div class="page-title">MIEMBROS</div><div class="page-subtitle">${members.length} miembros registrados</div></div>

function memberBadge(u){
  const exp = new Date(u.planExpiry);
  const now = new Date();
  const diff = (exp-now)/(1000*3600*24);
  if(u.status==='inactive') return '<span class="badge expired">Inactiva</span>';
  if(diff<0) return '<span class="badge expired">Vencida</span>';
  if(diff<15) return '<span class="badge pending">Por vencer</span>';
  return '<span class="badge active">Activa</span>';
}

  const u = USERS.find(u=>u.id===id);

  el.innerHTML = `

        ${calDays.map(d=>{
          const dayClasses = CLASSES.filter(c=>c.day===d.dayNum);
          return `<div class="cal-day ${d.isToday?'today':''}">
            <div class="cal-day-num">${d.date}</div>

function inscribirClase(cid){
  const cl = CLASSES.find(c=>c.id===cid);
  if(!cl||cl.enrolled>=cl.capacity){ showToast('Clase llena','error'); return; }
  if(!USER_CLASSES[currentUser.id]) USER_CLASSES[currentUser.id]=[];
  if(!USER_CLASSES[currentUser.id].includes(cid)){
    USER_CLASSES[currentUser.id].push(cid); cl.enrolled++;
    showToast(`Inscrito en ${cl.name}`,'success');
    renderClases(document.getElementById('page-clases'));
  }
}

function desinscribirClase(cid){
  const cl = CLASSES.find(c=>c.id===cid);
  if(!cl) return;
  USER_CLASSES[currentUser.id] = (USER_CLASSES[currentUser.id]||[]).filter(id=>id!==cid);
  cl.enrolled--;
  showToast(`Desinscrito de ${cl.name}`,'success');
  renderClases(document.getElementById('page-clases'));
}

function toggleAttendance(uid, date, btn){
  if(!ATTENDANCE[uid]) ATTENDANCE[uid]=[];
  if(ATTENDANCE[uid].includes(date)){
    ATTENDANCE[uid]=ATTENDANCE[uid].filter(d=>d!==date);
    btn.textContent='Marcar Presente'; btn.className='btn btn-sm btn-primary';
    btn.previousElementSibling && (btn.closest('tr').children[1].innerHTML='<span class="badge expired">Ausente</span>');
  } else {
    ATTENDANCE[uid].push(date);
    btn.textContent='Marcar Ausente'; btn.className='btn btn-sm btn-danger';
  }
  showToast('Asistencia actualizada','success');
  const attCell = btn.closest('tr').children[1];
  attCell.innerHTML = ATTENDANCE[uid].includes(date)?'<span class="badge active">Presente</span>':'<span class="badge expired">Ausente</span>';
}

  const today = new Date().toISOString().split('T')[0];
  const members = USERS.filter(u=>u.role==='user');
  openModal('REGISTRAR ASISTENCIA — HOY', `
    <div style="display:flex;flex-direction:column;gap:10px;">
    ${members.map(u=>{
      const present = (ATTENDANCE[u.id]||[]).includes(today);
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px;background:var(--black3);border-radius:var(--radius);">
        <div class="td-name"><div class="td-avatar red">${u.name[0]}</div>${u.name} ${u.lastname||''}</div>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" ${present?'checked':''} onchange="quickToggle(${u.id},'${today}',this.checked)" style="width:16px;height:16px;accent-color:var(--red);">
          <span style="font-size:12px;">${present?'Presente':'Ausente'}</span>
        </label>
      </div>`;
    }).join('')}
    </div>
    <div class="modal-actions"><button class="btn btn-primary" onclick="closeModal();showToast('Asistencia guardada','success');">Guardar</button></div>`);
}

function quickToggle(uid, date, checked){
  if(!ATTENDANCE[uid]) ATTENDANCE[uid]=[];
  if(checked && !ATTENDANCE[uid].includes(date)) ATTENDANCE[uid].push(date);
  if(!checked) ATTENDANCE[uid]=ATTENDANCE[uid].filter(d=>d!==date);
}

function calcStreak(uid){
  const att = [...(ATTENDANCE[uid]||[])].sort().reverse();
  let streak=0; let d=new Date();
  for(let i=0;i<30;i++){
    const key = d.toISOString().split('T')[0];
    if(att.includes(key)) streak++; else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function generateAttendanceDots(uid){
  const att = ATTENDANCE[uid]||[];
  const today = new Date();
  let html='';
  for(let i=29;i>=0;i--){
    const d = new Date(today); d.setDate(d.getDate()-i);
    const key = d.toISOString().split('T')[0];
    const present = att.includes(key);
    const isFuture = d>today;
    html+=`<div class="att-dot ${isFuture?'future':present?'present':'absent'}" data-tip="${key}">${d.getDate()}</div>`;
  }
  return html;
}

function requestPlan(planName){
  const p = PLANS.find(p=>p.name===planName);
  currentUser.plan=planName;
  const exp=new Date(); exp.setDate(exp.getDate()+(p?p.duration:30));
  currentUser.planExpiry=exp.toISOString().split('T')[0];
  showToast(`Plan ${planName} solicitado. Pendiente de confirmación.`,'success');
  renderPlanes(document.getElementById('page-planes'));
}

function openNuevoPlan(){
  openModal('NUEVO PLAN', `

    <div class="form-row">
      <div class="form-group"><label class="form-label">Precio (MXN)</label><input class="form-input" id="np-price" type="number" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Duración (días)</label><input class="form-input" id="np-dur" type="number" placeholder="30"></div>
    </div>
    <div class="form-group"><label class="form-label">Beneficios (uno por línea)</label><textarea class="form-input" id="np-features" rows="4" placeholder="Acceso a instalaciones&#10;Vestuarios&#10;..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="savePlan()">Crear Plan</button>
    </div>`);
}

function savePlan(){
  const name=document.getElementById('np-name').value.trim();
  const price=parseFloat(document.getElementById('np-price').value)||0;
  const duration=parseInt(document.getElementById('np-dur').value)||30;
  const features=document.getElementById('np-features').value.split('\n').map(f=>f.trim()).filter(Boolean);
  if(!name){ showToast('Nombre requerido','error'); return; }
  PLANS.push({id:nextId++,name,price,duration,features,popular:false});
  closeModal(); showToast('Plan creado','success');
  renderPlanes(document.getElementById('page-planes'));
}

function openEditPlan(id){
  const p=PLANS.find(p=>p.id===id); if(!p) return;
  openModal('EDITAR PLAN', `
    <div class="form-group"><label class="form-label">Nombre</label><input class="form-input" id="ep-name" value="${p.name}"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Precio</label><input class="form-input" id="ep-price" type="number" value="${p.price}"></div>
      <div class="form-group"><label class="form-label">Duración (días)</label><input class="form-input" id="ep-dur" type="number" value="${p.duration}"></div>
    </div>
    <div class="form-group"><label class="form-label">Beneficios (uno por línea)</label><textarea class="form-input" id="ep-features" rows="4">${p.features.join('\n')}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="updatePlan(${id})">Guardar</button>
    </div>`);
}

function updatePlan(id){
  const p=PLANS.find(p=>p.id===id); if(!p) return;
  p.name=document.getElementById('ep-name').value.trim()||p.name;
  p.price=parseFloat(document.getElementById('ep-price').value)||p.price;
  p.duration=parseInt(document.getElementById('ep-dur').value)||p.duration;
  p.features=document.getElementById('ep-features').value.split('\n').map(f=>f.trim()).filter(Boolean);
  closeModal(); showToast('Plan actualizado','success');
  renderPlanes(document.getElementById('page-planes'));
}

function switchProfileTab(tab, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

function savePerfil(){
  currentUser.name=document.getElementById('pf-name').value.trim()||currentUser.name;
  currentUser.lastname=document.getElementById('pf-lastname').value.trim();
  currentUser.email=document.getElementById('pf-email').value.trim()||currentUser.email;
  currentUser.phone=document.getElementById('pf-phone').value.trim();
  buildSidebar(); updateHeaderAvatar();
  showToast('Perfil actualizado','success');
  renderPerfil(document.getElementById('page-perfil'));
}

function changePassword(){
  const oldp=document.getElementById('pf-oldpass').value;
  const newp=document.getElementById('pf-newpass').value;
  const conf=document.getElementById('pf-confpass').value;
  if(oldp!==currentUser.pass){ showToast('Contraseña actual incorrecta','error'); return; }
  if(newp.length<6){ showToast('La nueva contraseña debe tener al menos 6 caracteres','error'); return; }
  if(newp!==conf){ showToast('Las contraseñas no coinciden','error'); return; }
  currentUser.pass=newp;
  showToast('Contraseña actualizada','success');
}

function saveGoal(){
  currentUser.goal=document.getElementById('pf-goal').value;
  showToast('Objetivo actualizado','success');
}

function uploadAvatar(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    currentUser.avatar=ev.target.result;
    const el=document.getElementById('profile-avatar-el');
    el.style.backgroundImage=`url(${ev.target.result})`;
    el.style.backgroundSize='cover'; el.style.backgroundPosition='center';
    el.querySelector('.profile-avatar-edit').textContent='✎';
    showToast('Foto actualizada','success');
  };
  reader.readAsDataURL(file);
}

// ============================================================
// MODAL & TOAST
// ============================================================
function openModal(title, body){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal(){ document.getElementById('modal-overlay').classList.add('hidden'); }
function closeModalOutside(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }

let toastTimer;
function showToast(msg, type='success'){
  const t=document.getElementById('toast');
  document.getElementById('toast-icon').textContent=type==='success'?'✅':'❌';
  document.getElementById('toast-msg').textContent=msg;
  t.className=`toast ${type}`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.add('hidden'),3000);
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeModal();
});

// RESPONSIVE: close sidebar on overlay click
document.addEventListener('click', e=>{
  const sidebar = document.getElementById('sidebar');
  if(window.innerWidth<=768 && !sidebar.contains(e.target) && !e.target.closest('#menu-toggle') && !sidebar.classList.contains('collapsed')){
    sidebar.classList.add('collapsed');
  }
});

// Init with sidebar collapsed on mobile
if(window.innerWidth<=768) document.getElementById('sidebar').classList.add('collapsed');
</script>
